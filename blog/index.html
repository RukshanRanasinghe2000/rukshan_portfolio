<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rukshan Ranasinghe</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#1a1a1a',
            surface: '#222222',
            border: '#333333',
            accent: '#e8a838',
            muted: '#888888',
            text: '#cccccc',
          },
          fontFamily: {
            mono: ['"JetBrains Mono"', 'monospace'],
          },
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'JetBrains Mono', monospace; font-size: 16px; }
    .nav-active { color: #e8a838; }
    .text-xs { font-size: 0.85rem !important; line-height: 1.5rem !important; }
    .text-sm { font-size: 1rem !important; line-height: 1.65rem !important; }
    /* HTMX loading indicator */
    #main-content.htmx-request { opacity: 0.4; transition: opacity 0.2s; }
  </style>
</head>
<body class="bg-[#1a1a1a] text-[#cccccc] min-h-screen flex">

  <!-- Sidebar -->
  <aside class="fixed top-0 left-0 h-full w-64 border-r border-[#333333] flex flex-col px-8 py-10 z-10">
    <a href="/"
       hx-get="/partials/home"
       hx-target="#main-content"
       hx-push-url="/"
       hx-on::after-request="setActive('home')"
       class="text-[#e8a838] font-bold text-2xl mb-10 tracking-tight hover:opacity-80 transition-opacity cursor-pointer">
      Rukshan Ranasinghe
    </a>

    <!-- Social links -->
    <div class="flex flex-col gap-3 mb-auto text-sm text-[#cccccc]">
      <a href="mailto:navodrukshan2000@gmail.com" class="flex items-center gap-2 hover:text-[#e8a838] transition-colors">
        <span class="text-[#888888]">@</span> Email ↗
      </a>
      <a href="https:&#x2F;&#x2F;github.com&#x2F;RukshanRanasinghe2000" target="_blank" rel="noopener" class="flex items-center gap-2 hover:text-[#e8a838] transition-colors">
        <svg class="w-4 h-4 text-[#888888]" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
        GitHub ↗
      </a>
    </div>

    <!-- Nav links — HTMX powered -->
    <nav id="sidebar-nav" class="flex flex-col gap-2 text-sm mt-10">
      <a data-nav="projects"
         hx-get="/partials/projects"
         hx-target="#main-content"
         hx-push-url="/projects/"
         hx-on::after-request="setActive('projects')"
         class="nav-link hover:text-[#e8a838] transition-colors cursor-pointer">/ Projects</a>

      <a data-nav="blog"
         hx-get="/partials/blog"
         hx-target="#main-content"
         hx-push-url="/blog/"
         hx-on::after-request="setActive('blog')"
         class="nav-link hover:text-[#e8a838] transition-colors cursor-pointer">/ Blog</a>

      <a data-nav="home"
         hx-get="/partials/home"
         hx-target="#main-content"
         hx-push-url="/"
         hx-on::after-request="setActive('home')"
         class="nav-link hover:text-[#e8a838] transition-colors cursor-pointer">/ Home</a>
    </nav>
  </aside>

  <!-- Main content — HTMX swap target -->
  <main id="main-content" class="ml-64 flex-1 min-h-screen transition-opacity duration-200">
    
<div class="px-10 py-12">
  <div id="loading" class="text-[#888888] text-sm">Loading articles...</div>
  <div id="error" class="hidden text-[#888888] text-sm">Failed to load articles.</div>
  <div id="articles-grid" class="hidden grid grid-cols-1 md:grid-cols-2 gap-4"></div>
</div>

<script>
  const MEDIUM_FEED = 'https://medium.com/feed/@rukshanranasinghe2000';
  const RSS2JSON = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(MEDIUM_FEED)}`;

  async function loadArticles() {
    const loading = document.getElementById('loading');
    const error = document.getElementById('error');
    const grid = document.getElementById('articles-grid');

    try {
      const res = await fetch(RSS2JSON);
      if (!res.ok) throw new Error();
      const data = await res.json();
      if (data.status !== 'ok') throw new Error();

      const items = data.items;
      loading.classList.add('hidden');

      if (!items.length) {
        error.textContent = 'No articles found.';
        error.classList.remove('hidden');
        return;
      }

      grid.innerHTML = items.map(item => {
        const date = new Date(item.pubDate).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
        const tags = (item.categories || []).slice(0, 3);
        let thumbnail = item.thumbnail || '';
        if (!thumbnail && item.content) {
          const match = item.content.match(/<img[^>]+src="([^"]+)"/);
          if (match) thumbnail = match[1];
        }
        return `
          <a href="${item.link}" target="_blank" rel="noopener"
             class="group flex flex-col border border-[#333333] hover:border-[#e8a838] transition-colors bg-[#1a1a1a]">
            ${thumbnail ? `
            <div class="w-full h-44 overflow-hidden bg-[#222222]">
              <img src="${thumbnail}" alt="" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity" />
            </div>` : '<div class="w-full h-44 bg-[#222222]"></div>'}
            <div class="flex flex-col gap-2 p-4 flex-1">
              <div class="flex items-start justify-between gap-3">
                <h2 class="text-white text-xs font-bold uppercase tracking-wide leading-snug group-hover:text-[#e8a838] transition-colors">
                  ${escapeHtml(item.title)}
                </h2>
                <span class="text-[#555555] text-xs shrink-0">${date}</span>
              </div>
              ${item.description ? `
              <p class="text-[#888888] text-xs leading-relaxed line-clamp-3">
                ${stripHtml(item.description).slice(0, 160)}...
              </p>` : ''}
              ${tags.length ? `
              <div class="flex flex-wrap gap-2 mt-auto pt-2">
                ${tags.map(t => `<span class="text-[#666666] text-xs border border-[#333333] px-2 py-0.5">${escapeHtml(t)}</span>`).join('')}
              </div>` : ''}
            </div>
          </a>
        `;
      }).join('');

      grid.classList.remove('hidden');
    } catch (e) {
      loading.classList.add('hidden');
      error.classList.remove('hidden');
    }
  }

  function escapeHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function stripHtml(html) {
    const tmp = document.createElement('div');
    tmp.innerHTML = html;
    return tmp.textContent || tmp.innerText || '';
  }

  loadArticles();
</script>

  </main>

  <script>
    // Set active nav item
    function setActive(name) {
      document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('nav-active'));
      const active = document.querySelector(`[data-nav="${name}"]`);
      if (active) active.classList.add('nav-active');
    }

    // Set active on initial load based on current path
    (function() {
      const path = window.location.pathname;
      if (path.startsWith('/projects')) setActive('projects');
      else if (path.startsWith('/blog')) setActive('blog');
      else setActive('home');
    })();

    // Handle browser back/forward
    window.addEventListener('popstate', () => {
      const path = window.location.pathname;
      let partial = 'home';
      if (path.startsWith('/projects')) partial = 'projects';
      else if (path.startsWith('/blog')) partial = 'blog';

      htmx.ajax('GET', `/partials/${partial}`, { target: '#main-content', swap: 'innerHTML' });
      setActive(partial);
    });

    // Re-run scripts injected by HTMX swaps
    document.addEventListener('htmx:afterSwap', () => {
      const scripts = document.querySelectorAll('#main-content script');
      scripts.forEach(old => {
        const s = document.createElement('script');
        s.textContent = old.textContent;
        old.replaceWith(s);
      });
    });
  </script>

</body>
</html>
