<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ config.title }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#1a1a1a',
            surface: '#222222',
            border: '#333333',
            accent: '#e8a838',
            muted: '#888888',
            text: '#cccccc',
          },
          fontFamily: {
            mono: ['"JetBrains Mono"', 'monospace'],
          },
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'JetBrains Mono', monospace; font-size: 16px; }
    .nav-active { color: #e8a838; }
    .text-xs { font-size: 0.85rem !important; line-height: 1.5rem !important; }
    .text-sm { font-size: 1rem !important; line-height: 1.65rem !important; }
    #main-content.htmx-request { opacity: 0.4; transition: opacity 0.2s; }
    #mobile-drawer { transform: translateX(-100%); transition: transform 0.3s ease; }
    #mobile-drawer.open { transform: translateX(0); }
  </style>
</head>
<body class="bg-[#1a1a1a] text-[#cccccc] min-h-screen">

  <!-- Mobile top bar -->
  <header class="md:hidden fixed top-0 left-0 right-0 z-30 bg-[#1a1a1a] border-b border-[#333333] flex items-center justify-between px-6 py-4">
    <a href="{{ get_url(path='/') }}"
       hx-get="{{ get_url(path='partials/home') }}"
       hx-target="#main-content"
       hx-push-url="{{ get_url(path='/') }}"
       hx-on::after-request="setActive('home'); closeDrawer()"
       class="text-[#e8a838] font-bold text-xl tracking-tight">
      {{ config.extra.alias }}
    </a>
    <button onclick="toggleDrawer()" aria-label="Menu" class="text-[#cccccc] hover:text-[#e8a838] transition-colors">
      <svg id="hamburger-icon" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>
  </header>

  <!-- Mobile drawer overlay -->
  <div id="drawer-overlay" class="md:hidden fixed inset-0 z-20 bg-black/60 hidden" onclick="closeDrawer()"></div>

  <!-- Mobile drawer -->
  <div id="mobile-drawer" class="md:hidden fixed top-0 left-0 h-full w-64 z-30 bg-[#1a1a1a] border-r border-[#333333] flex flex-col px-8 py-10">
    <div class="text-[#e8a838] font-bold text-xl mb-10 tracking-tight">{{ config.extra.alias }}</div>

    <div id="mobile-social" class="flex flex-col gap-3 mb-8 text-sm text-[#cccccc] overflow-hidden transition-all duration-500" style="max-height:0;opacity:0">
      <a href="{{ config.extra.email }}" class="group flex items-center gap-2 hover:text-[#e8a838] transition-colors">
        <svg class="w-4 h-4 text-[#888888]" fill="currentColor" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4-8 5-8-5V6l8 5 8-5v2z"/></svg>
        Email <span class="transition-all duration-200 group-hover:translate-x-1 inline-block">↗</span>
      </a>
      <a href="{{ config.extra.github }}" target="_blank" rel="noopener" class="group flex items-center gap-2 hover:text-[#e8a838] transition-colors">
        <svg class="w-4 h-4 text-[#888888]" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
        GitHub <span class="transition-all duration-200 group-hover:translate-x-1 inline-block">↗</span>
      </a>
      <a href="{{ config.extra.linkedin }}" target="_blank" rel="noopener" class="group flex items-center gap-2 hover:text-[#e8a838] transition-colors">
        <svg class="w-4 h-4 text-[#888888]" fill="currentColor" viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
        LinkedIn <span class="transition-all duration-200 group-hover:translate-x-1 inline-block">↗</span>
      </a>
    </div>

    <nav class="flex flex-col gap-4 text-sm">
      <a data-nav="projects" onclick="closeDrawer()"
         hx-get="{{ get_url(path='partials/projects') }}"
         hx-target="#main-content"
         hx-push-url="{{ get_url(path='projects') }}"
         hx-on::after-request="setActive('projects')"
         class="nav-link mobile-nav-link hover:text-[#e8a838] transition-colors cursor-pointer">
        <span class="nav-prefix">/ </span><span class="nav-label">Projects</span>
      </a>
      <a data-nav="blog" onclick="closeDrawer()"
         hx-get="{{ get_url(path='partials/blog') }}"
         hx-target="#main-content"
         hx-push-url="{{ get_url(path='blog') }}"
         hx-on::after-request="setActive('blog')"
         class="nav-link mobile-nav-link hover:text-[#e8a838] transition-colors cursor-pointer">
        <span class="nav-prefix">/ </span><span class="nav-label">Blog</span>
      </a>
      <a data-nav="home" onclick="closeDrawer()"
         hx-get="{{ get_url(path='partials/home') }}"
         hx-target="#main-content"
         hx-push-url="{{ get_url(path='/') }}"
         hx-on::after-request="setActive('home')"
         class="nav-link mobile-nav-link hover:text-[#e8a838] transition-colors cursor-pointer">
        <span class="nav-prefix">/ </span><span class="nav-label">Home</span>
      </a>
    </nav>
  </div>

  <div class="flex min-h-screen">
    <!-- Desktop sidebar -->
    <aside class="hidden md:flex fixed top-0 left-0 h-full w-64 border-r border-[#333333] flex-col px-8 py-10 z-10">
      <a href="{{ get_url(path='/') }}"
         hx-get="{{ get_url(path='partials/home') }}"
         hx-target="#main-content"
         hx-push-url="{{ get_url(path='/') }}"
         hx-on::after-request="setActive('home')"
         class="text-[#e8a838] font-bold text-2xl mb-10 tracking-tight hover:opacity-80 transition-opacity cursor-pointer">
        {{ config.extra.alias }}
      </a>

      <div id="sidebar-social" class="flex flex-col gap-3 mb-12 text-sm text-[#cccccc] overflow-hidden transition-all duration-500 ease-in-out" style="max-height:0;opacity:0">
        <a href="{{ config.extra.email }}" class="group flex items-center gap-2 hover:text-[#e8a838] transition-colors">
          <svg class="w-4 h-4 text-[#888888]" fill="currentColor" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4-8 5-8-5V6l8 5 8-5v2z"/></svg>
          Email <span class="transition-all duration-200 group-hover:translate-x-1 inline-block">↗</span>
        </a>
        <a href="{{ config.extra.github }}" target="_blank" rel="noopener" class="group flex items-center gap-2 hover:text-[#e8a838] transition-colors">
          <svg class="w-4 h-4 text-[#888888]" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
          GitHub <span class="transition-all duration-200 group-hover:translate-x-1 inline-block">↗</span>
        </a>
        <a href="{{ config.extra.linkedin }}" target="_blank" rel="noopener" class="group flex items-center gap-2 hover:text-[#e8a838] transition-colors">
          <svg class="w-4 h-4 text-[#888888]" fill="currentColor" viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
          LinkedIn <span class="transition-all duration-200 group-hover:translate-x-1 inline-block">↗</span>
        </a>
      </div>

      <nav id="sidebar-nav" class="flex flex-col gap-2 text-sm mt-10">
        <a data-nav="projects"
           hx-get="{{ get_url(path='partials/projects') }}"
           hx-target="#main-content"
           hx-push-url="{{ get_url(path='projects') }}"
           hx-on::after-request="setActive('projects')"
           class="nav-link hover:text-[#e8a838] transition-colors cursor-pointer">
          <span class="nav-prefix">/ </span><span class="nav-label">Projects</span>
        </a>
        <a data-nav="blog"
           hx-get="{{ get_url(path='partials/blog') }}"
           hx-target="#main-content"
           hx-push-url="{{ get_url(path='blog') }}"
           hx-on::after-request="setActive('blog')"
           class="nav-link hover:text-[#e8a838] transition-colors cursor-pointer">
          <span class="nav-prefix">/ </span><span class="nav-label">Blog</span>
        </a>
        <a data-nav="home"
           hx-get="{{ get_url(path='partials/home') }}"
           hx-target="#main-content"
           hx-push-url="{{ get_url(path='/') }}"
           hx-on::after-request="setActive('home')"
           class="nav-link hover:text-[#e8a838] transition-colors cursor-pointer">
          <span class="nav-prefix">/ </span><span class="nav-label">Home</span>
        </a>
      </nav>
    </aside>

    <!-- Main content -->
    <main id="main-content" class="w-full md:ml-64 min-h-screen transition-opacity duration-200 pt-16 md:pt-0">
      {% block content %}{% endblock %}
    </main>
  </div>

  <script>
    function toggleDrawer() {
      const drawer = document.getElementById('mobile-drawer');
      const overlay = document.getElementById('drawer-overlay');
      drawer.classList.toggle('open');
      overlay.classList.toggle('hidden');
    }

    function closeDrawer() {
      document.getElementById('mobile-drawer').classList.remove('open');
      document.getElementById('drawer-overlay').classList.add('hidden');
    }

    function setActive(name) {
      document.querySelectorAll('.nav-link').forEach(el => {
        el.classList.remove('nav-active');
        el.querySelector('.nav-prefix').textContent = '/ ';
      });
      document.querySelectorAll(`[data-nav="${name}"]`).forEach(el => {
        el.classList.add('nav-active');
        el.querySelector('.nav-prefix').textContent = '- ';
      });

      // desktop sidebar social
      const social = document.getElementById('sidebar-social');
      const mobileSocial = document.getElementById('mobile-social');
      const show = name !== 'home';
      [social, mobileSocial].forEach(el => {
        if (!el) return;
        el.style.maxHeight = show ? '200px' : '0';
        el.style.opacity = show ? '1' : '0';
      });
    }

    const BASE = '{{ config.base_url }}';
    const BASE_PATH = new URL(BASE).pathname.replace(/\/$/, '');

    function toPath(fullUrl) {
      return new URL(fullUrl).pathname;
    }

    (function() {
      const path = window.location.pathname;
      if (path.startsWith(BASE_PATH + '/projects')) setActive('projects');
      else if (path.startsWith(BASE_PATH + '/blog')) setActive('blog');
      else {
        setActive('home');
        htmx.ajax('GET', toPath('{{ get_url(path="partials/home") }}'), { target: '#main-content', swap: 'innerHTML' });
      }
    })();

    window.addEventListener('popstate', () => {
      const path = window.location.pathname;
      let url = toPath('{{ get_url(path="partials/home") }}');
      let partial = 'home';
      if (path.startsWith(BASE_PATH + '/projects')) { partial = 'projects'; url = toPath('{{ get_url(path="partials/projects") }}'); }
      else if (path.startsWith(BASE_PATH + '/blog')) { partial = 'blog'; url = toPath('{{ get_url(path="partials/blog") }}'); }
      htmx.ajax('GET', url, { target: '#main-content', swap: 'innerHTML' });
      setActive(partial);
    });

    document.addEventListener('htmx:afterSwap', () => {
      document.querySelectorAll('#main-content script').forEach(old => {
        const s = document.createElement('script');
        s.textContent = old.textContent;
        old.replaceWith(s);
      });
    });
  </script>

</body>
</html>
