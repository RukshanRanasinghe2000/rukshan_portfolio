<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ config.title }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#1a1a1a',
            surface: '#222222',
            border: '#333333',
            accent: '#e8a838',
            muted: '#888888',
            text: '#cccccc',
          },
          fontFamily: {
            mono: ['"JetBrains Mono"', 'monospace'],
          },
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'JetBrains Mono', monospace; font-size: 16px; }
    .nav-active { color: #e8a838; }
    /* Scale up Tailwind's text-xs and text-sm site-wide */
    .text-xs { font-size: 0.85rem !important; line-height: 1.5rem !important; }
    .text-sm { font-size: 1rem !important; line-height: 1.65rem !important; }
  </style>
</head>
<body class="bg-[#1a1a1a] text-[#cccccc] min-h-screen flex">

  <!-- Sidebar -->
  <aside class="fixed top-0 left-0 h-full w-64 border-r border-[#333333] flex flex-col px-8 py-10 z-10">
    <a href="/" class="text-[#e8a838] font-bold text-2xl mb-10 tracking-tight hover:opacity-80 transition-opacity">
      {{ config.extra.alias }}
    </a>

    <!-- Social links -->
    <div class="flex flex-col gap-3 mb-auto text-sm text-[#cccccc]">
      <a href="{{ config.extra.email }}" class="flex items-center gap-2 hover:text-[#e8a838] transition-colors">
        <span class="text-[#888888]">@</span> Email ↗
      </a>
      <a href="{{ config.extra.github }}" target="_blank" rel="noopener" class="flex items-center gap-2 hover:text-[#e8a838] transition-colors">
        <svg class="w-4 h-4 text-[#888888]" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
        GitHub ↗
      </a>
    </div>

    <!-- Nav links -->
    <nav class="flex flex-col gap-2 text-sm mt-10">
      <a href="/projects" class="hover:text-[#e8a838] transition-colors {% if current_path is defined and current_path == '/projects/' %}nav-active{% endif %}">/ Projects</a>
      <a href="/blog" class="hover:text-[#e8a838] transition-colors {% if current_path is defined and current_path == '/blog/' %}nav-active{% endif %}">/ Blog</a>
      <a href="/config" class="hover:text-[#e8a838] transition-colors {% if current_path is defined and current_path == '/config/' %}nav-active{% endif %}">/ Config</a>
      <a href="/" class="hover:text-[#e8a838] transition-colors {% if current_path is defined and current_path == '/' %}nav-active{% endif %}">/ Home</a>
    </nav>
  </aside>

  <!-- Main content -->
  <main class="ml-64 flex-1 min-h-screen">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
