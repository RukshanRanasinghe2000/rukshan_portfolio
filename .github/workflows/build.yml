name: Build and Deploy Zola Site

on:
  push:
    branches: [main]

  schedule:
    - cron: "0 0 * * *"

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Fetcher
        env:
          GITHUB_TOKEN: ${{ secrets.GIT_TOKEN_API }}
        run: |
          cd fetcher
          npm install
          npm run fetch

      - name: Install Zola
        run: |
          wget https://github.com/getzola/zola/releases/download/v0.17.2/zola-v0.17.2-x86_64-unknown-linux-gnu.tar.gz
          tar -xvf zola*.tar.gz

      - name: Build Site
        run: ./zola build

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GIT_TOKEN_API }}
          publish_dir: ./public