name: Build and Deploy Zola Site

on:
  push:
    branches: [main]

  schedule:
    - cron: "0 0 * * *"

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run Fetcher
        env:
          GH_TOKEN: ${{ secrets.GIT_TOKEN_API }}
        run: bash fetcher/fetch.sh

      - name: Check data folder
        run: ls -la data/ && cat data/projects.json && cat data/blogs.json

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/projects.json data/blogs.json
          git diff --cached --quiet || git commit -m "chore: update projects and blogs data [skip ci]"
          git push

      - name: Install Zola
        run: |
          wget -q https://github.com/getzola/zola/releases/download/v0.19.2/zola-v0.19.2-x86_64-unknown-linux-gnu.tar.gz
          tar -xvf zola-v0.19.2-x86_64-unknown-linux-gnu.tar.gz
          chmod +x zola

      - name: Build Site
        run: ./zola build

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: release
