name: Build and Deploy Zola Site

on:
  push:
    branches: [main]

  schedule:
    - cron: "* * * * *"

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Fetcher
        env:
          GH_TOKEN: ${{ secrets.GIT_TOKEN_API }}
        run: bash fetcher/fetch.sh

      - name: Install Zola
        run: |
          wget -q https://github.com/getzola/zola/releases/download/v0.22.1/zola-v0.22.1-x86_64-unknown-linux-gnu.tar.gz
          tar -xvf zola-v0.22.1-x86_64-unknown-linux-gnu.tar.gz
          chmod +x zola

      - name: Build Site
        run: ./zola build

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GIT_TOKEN_API }}
          publish_dir: ./public